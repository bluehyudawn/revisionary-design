<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Profile — RevisionaryOnline</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="kit/kit.css">

<script>
  /* force initial route to "profile" — runs before the kit App reads localStorage */
  try { localStorage.setItem("route", "profile"); } catch (e) {}
</script>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
  /* ─── GSAP-style motion polish ─── */
  .class-card, .class-row { will-change: transform; }
  .class-card { transition: transform .45s cubic-bezier(.22,1,.36,1), box-shadow .35s ease, border-color .3s ease; }
  .class-card:hover { transform: translateY(-3px); }

  .tabs-underline button { transition: color .25s ease; }
  .view-toggle button    { transition: background-color .25s ease, color .25s ease; }

  .modal-sheet, .confirm-dialog { will-change: transform, opacity; }

  .more-btn:focus-visible { outline: 2px solid var(--color-revision-500); outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="kit/Primitives.jsx"></script>
<script type="text/babel" src="kit/SubjectIcons.jsx"></script>
<script type="text/babel" src="kit/Shell.jsx"></script>
<script type="text/babel" src="kit/Dashboard.jsx"></script>
<script type="text/babel" src="kit/MyExams.jsx"></script>
<script type="text/babel" src="kit/Profile.jsx"></script>
<script type="text/babel" src="kit/Classroom.jsx"></script>
<script type="text/babel" src="kit/CreateExam.jsx"></script>
<script type="text/babel" src="kit/Marking.jsx"></script>
<script type="text/babel" src="kit/QuestionBank.jsx"></script>
<script type="text/babel" src="kit/Login.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

const CRUMBS = {
  dashboard: ["Dashboard"],
  classroom: ["Classroom"],
  creation:  ["Creation", "Edit exam"],
  bank:      ["Question Bank"],
  marking:   ["Marking"],
  myexams:   ["My Exams"],
  notif:     ["Notification"],
  profile:   ["Profile"],
  settings:  ["Settings"],
};

function App() {
  const [route, setRoute] = useState(() => localStorage.getItem("route") || "classroom");
  useEffect(() => { localStorage.setItem("route", route); }, [route]);
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const mainRef = useRef(null);
  useEffect(() => {
    if (!window.gsap || !mainRef.current) return;
    const cards = mainRef.current.querySelectorAll(".class-card, .class-row");
    if (!cards.length) return;
    gsap.fromTo(cards,
      { y: 18, opacity: 0 },
      { y: 0, opacity: 1, duration: .55, ease: "power3.out", stagger: .05, clearProps: "all" }
    );
  }, [route]);

  if (route === "login") return <Login onSignIn={() => setRoute("dashboard")} />;

  let screen = <Dashboard onNav={setRoute} />;
  if (route === "classroom") screen = <Classroom />;
  else if (route === "creation") screen = <CreateExam />;
  else if (route === "myexams") screen = <MyExams onNav={setRoute} />;
  else if (route === "marking") screen = <Marking onNav={setRoute} />;
  else if (route === "bank") screen = <QuestionBank />;
  else if (route === "profile") screen = <Profile />;
  else if (!["dashboard"].includes(route))
    screen = (
      <div className="page">
        <div className="page-head"><h1>{CRUMBS[route]?.[0] || "Page"}</h1></div>
        <div className="card" style={{ padding: 40, textAlign: "center", color: "var(--fg-3)" }}>Screen stub.</div>
      </div>
    );

  return (
    <div className="app">
      <Sidebar active={route} onNav={setRoute} />
      <div className="main" ref={mainRef}>
        <TopBar crumb={CRUMBS[route] || [route]} onNav={setRoute} />
        {screen}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
