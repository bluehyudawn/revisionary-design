<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog & Resources — RevisionOnline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --stone-50:#f8f8f6; --stone-100:#f4f4f1; --stone-200:#e7e5e4;
      --stone-300:#d6d3d1; --stone-400:#a6a09b; --stone-500:#79716b;
      --stone-600:#57534d; --stone-700:#44403b; --stone-800:#292524; --stone-900:#1c1917;
      --revision-50:#f5f2ff; --revision-100:#ece8fd; --revision-200:#dcd1ff;
      --revision-400:#a280f8; --revision-500:#783cf0; --revision-600:#7225e6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #F5F5F5; color: var(--stone-900); -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }
    .clamp2 { overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .clamp3 { overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-thumb { background:#d6d3d1; border-radius:3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ── Design tokens ─────────────────────────────────────────────────── */
const BADGE_STYLE = {
  "Study Tips":     { bg:"#ece8fd", color:"#783cf0" },
  "Subject Guides": { bg:"#dfe8ff", color:"#5967f4" },
  "Exam Prep":      { bg:"#ffedd4", color:"#ea5a0c" },
  "VCE News":       { bg:"#d1faea", color:"#07947a" },
};
const CATEGORIES = ["All","Study Tips","Exam Prep","Subject Guides","VCE News"];

/* ── Figma assets ──────────────────────────────────────────────────── */
const IMG_ENVELOPE    = "http://localhost:3845/assets/22ee8a008520abfa98069404d6cf1160a598b914.svg";
const IMG_VECTOR25    = "http://localhost:3845/assets/3d38e5d3ed22e6f6c300003f9103243afcefd890.svg";

/* ── Data ──────────────────────────────────────────────────────────── */
const FEATURED = {
  category:"Study Tips", title:"The Complete Guide to VCE Exam Preparation: Everything You Need to Know",
  excerpt:"From building your study schedule to mastering exam technique, this comprehensive guide covers every aspect of VCE preparation — based on research and interviews with Australia's top-performing students.",
  author:"Sarah Mitchell", initials:"SM", date:"20 Mar 2026", readTime:"12 min",
  gradient:"linear-gradient(135deg,#f5f2ff 0%,#dcd1ff 45%,#a280f8 100%)",
};

const ARTICLES = [
  { id:1, category:"Study Tips",     title:"How to Ace Your VCE English: Text Response Strategies",           excerpt:"Master the art of writing compelling text responses with proven strategies from top-scoring VCE students across Australia.",                      author:"Sarah Mitchell",  initials:"SM", date:"18 Mar 2026", readTime:"8 min",  gradient:"linear-gradient(135deg,#f5f2ff,#dcd1ff)" },
  { id:2, category:"Study Tips",     title:"The Science of Spaced Repetition: Study Smarter, Not Harder",    excerpt:"Discover how cognitive science can transform your study routine with evidence-based spaced repetition techniques.",                             author:"James Chen",      initials:"JC", date:"14 Mar 2026", readTime:"6 min",  gradient:"linear-gradient(135deg,#dfe8ff,#a1b8ff)" },
  { id:3, category:"Subject Guides", title:"VCE Math Methods: 5 Topics Every Student Struggles With",        excerpt:"An in-depth breakdown of the most challenging Math Methods topics with worked examples and practice strategies.",                              author:"Emma Torres",     initials:"ET", date:"10 Mar 2026", readTime:"10 min", gradient:"linear-gradient(135deg,#d1faea 0%,#07947a 90%)" },
  { id:4, category:"Exam Prep",      title:"Managing Exam Anxiety: Strategies That Actually Work",           excerpt:"Evidence-based techniques to manage stress and anxiety before and during your VCE exams for peak performance.",                              author:"Dr. Lisa Park",   initials:"LP", date:"6 Mar 2026",  readTime:"7 min",  gradient:"linear-gradient(135deg,#ffedd4 0%,#ea5a0c 90%)" },
  { id:5, category:"VCE News",       title:"Understanding Your ATAR: How Study Scores Are Calculated",       excerpt:"A clear explanation of how your ATAR is calculated from study scores, scaling, and what this means for your university applications.",        author:"Ryan Walsh",      initials:"RW", date:"2 Mar 2026",  readTime:"5 min",  gradient:"linear-gradient(135deg,#ece8fd 0%,#783cf0 90%)" },
  { id:6, category:"Exam Prep",      title:"How to Build a Revision Schedule That Actually Works",           excerpt:"Step-by-step guide to creating a realistic, effective revision schedule that accounts for your workload and maintains your wellbeing.",      author:"Sarah Mitchell",  initials:"SM", date:"26 Feb 2026", readTime:"9 min",  gradient:"linear-gradient(135deg,#dfe8ff 0%,#5967f4 90%)" },
  { id:7, category:"Subject Guides", title:"VCE Chemistry: Mastering Equilibrium Questions in Unit 3 & 4",  excerpt:"Break down the complex world of chemical equilibrium with our structured approach to the most heavily-examined topics in VCE Chemistry.",     author:"Emma Torres",     initials:"ET", date:"20 Feb 2026", readTime:"8 min",  gradient:"linear-gradient(135deg,#d1faea 0%,#057764 90%)" },
  { id:8, category:"Study Tips",     title:"Top 10 Study Habits of High-Achieving VCE Students",            excerpt:"We interviewed students who scored 40+ study scores to uncover the habits and routines that set them apart from their peers.",               author:"James Chen",      initials:"JC", date:"14 Feb 2026", readTime:"6 min",  gradient:"linear-gradient(135deg,#dfe8ff 0%,#4b4ded 90%)" },
];

/* ── Shared components ─────────────────────────────────────────────── */
function Badge({ category, size="sm", white=false }) {
  const b = BADGE_STYLE[category] || { bg:"#e7e5e4", color:"#57534d" };
  const bg    = white ? "#fff" : b.bg;
  const color = white ? b.color : b.color;
  const border = white ? `1px solid rgba(0,0,0,0.12)` : "none";
  return (
    <span style={{ display:"inline-flex", alignItems:"center", padding:size==="lg"?"4px 14px":"2px 10px", borderRadius:6, background:bg, border, fontFamily:"Inter,sans-serif", fontWeight:500, fontSize:size==="lg"?13:12, lineHeight:1.5, color, whiteSpace:"nowrap" }}>
      {category}
    </span>
  );
}

function Avatar({ initials, size=36 }) {
  return (
    <div style={{ width:size, height:size, borderRadius:"50%", background:"linear-gradient(135deg,#dcd1ff,#783cf0)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      <span style={{ fontFamily:"Nunito,sans-serif", fontWeight:800, fontSize:Math.round(size*0.38), color:"#fff" }}>{initials}</span>
    </div>
  );
}

/* ── Nav (matches blog-detail) ─────────────────────────────────────── */
function Nav() {
  return (
    <nav style={{ position:"sticky", top:0, zIndex:100, background:"#ffffff", borderBottom:"1px solid #e7e5e4", height:56 }}>
      <div style={{ maxWidth:1440, margin:"0 auto", padding:"0 50px", height:"100%", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:44 }}>
          <a href="#">
            <img src="combination.svg" alt="Revisionary Online" style={{ height:30, width:"auto", display:"block" }} />
          </a>
          <div style={{ display:"flex", alignItems:"center", gap:32 }}>
            {["Score Calculator","VCE Schedule","Features","Contact"].map(item => (
              <a key={item} href="#"
                style={{ fontFamily:"Inter,sans-serif", fontWeight:500, fontSize:14, color:"#000", textDecoration:"none", whiteSpace:"nowrap", lineHeight:1.4 }}>
                {item}
              </a>
            ))}
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:21 }}>
          <a href="#" style={{ fontFamily:"Inter,sans-serif", fontWeight:500, fontSize:14, color:"#000", textDecoration:"none", whiteSpace:"nowrap" }}>
            Login
          </a>
          <a href="#" style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", padding:"7px 16px", borderRadius:70, background:"#772efe", fontFamily:"Inter,sans-serif", fontWeight:600, fontSize:14, color:"#fff", textDecoration:"none", whiteSpace:"nowrap" }}>
            Sign Up - It's free
          </a>
        </div>
      </div>
    </nav>
  );
}

/* ── Footer (matches blog-detail) ─────────────────────────────────── */
function Footer() {
  return (
    <footer style={{ background:"#D6D3D1", position:"relative", height:380, overflow:"hidden" }}>
      <img src="symbol.svg" alt=""
        style={{ position:"absolute", left:50, top:36, width:76, height:76 }} />
      <div style={{ position:"absolute", left:"60.3%", top:36,
        display:"flex", flexDirection:"column", gap:16,
        fontFamily:"Inter,sans-serif", fontWeight:500, fontSize:20,
        color:"#000", lineHeight:1.4, whiteSpace:"nowrap" }}>
        {["Score Calculator","VCE Schedule","Features","Contact"].map(item => (
          <a key={item} href="#" style={{ color:"inherit", textDecoration:"none" }}>{item}</a>
        ))}
      </div>
      <img src="wordmark.png" alt="Revisionary Online"
        style={{ position:"absolute", left:50, bottom:31, width:655, height:71 }} />
      <div style={{ position:"absolute", left:"60.3%", bottom:36,
        fontFamily:"Inter,sans-serif", fontWeight:500, fontSize:12,
        color:"#1f1f1f", opacity:0.5, lineHeight:1.5, whiteSpace:"nowrap" }}>
        <div>REVISION ONLINE PTY LTD©2026</div>
        <div>Trademarks and brands are the property of RevisionaryOnline.</div>
      </div>
    </footer>
  );
}

/* ── Page-specific components ──────────────────────────────────────── */
function Hero() {
  return (
    <section style={{ background:"linear-gradient(180deg,#ffffff 0%,#f8f7ff 50%,#F5F5F5 100%)", padding:"72px 180px 80px", position:"relative", overflow:"hidden" }}>
      {/* Bottom fade to blend into page bg */}
      <div style={{ position:"absolute", bottom:0, left:0, right:0, height:60, background:"linear-gradient(to bottom,transparent,#F5F5F5)", pointerEvents:"none" }} />
      <div style={{ maxWidth:1440, margin:"0 auto", position:"relative", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        {/* Left: copy */}
        <div style={{ maxWidth:560 }}>
          <div style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"5px 14px", borderRadius:60, background:"#ece8fd", marginBottom:22 }}>
            <span style={{ width:6, height:6, borderRadius:"50%", background:"#783cf0", flexShrink:0 }} />
            <span style={{ fontFamily:"Inter,sans-serif", fontWeight:600, fontSize:13, color:"#783cf0" }}>Blog & Resources</span>
          </div>
          <h1 style={{ fontFamily:"Nunito,sans-serif", fontWeight:800, fontSize:52, lineHeight:1.06, color:"#1c1917", marginBottom:18 }}>
            Study smarter,<br />
            <span style={{ color:"#783cf0" }}>not just harder.</span>
          </h1>
          <p style={{ fontFamily:"Inter,sans-serif", fontWeight:400, fontSize:18, lineHeight:1.56, color:"#57534d", maxWidth:460 }}>
            Expert strategies, subject guides, and study insights to help every VCE student reach their potential.
          </p>
        </div>
        {/* Right: subjects gem illustration */}
        <div style={{ flexShrink:0, marginRight:20 }}>
          <img src="subjects-gem.svg" alt="" style={{ width:420, height:"auto", display:"block", filter:"drop-shadow(0 24px 48px rgba(120,60,240,0.18))" }} />
        </div>
      </div>
    </section>
  );
}

function FeaturedCard({ article }) {
  const [hovered, setHovered] = useState(false);
  return (
    <a href="blog-detail.html"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{ display:"flex", background:"#fff", borderRadius:16, border:"1px solid #e7e5e4", overflow:"hidden", boxShadow:hovered?"0 8px 32px rgba(120,60,240,0.12)":"0 2px 8px rgba(0,0,0,0.04)", transition:"box-shadow 0.2s", cursor:"pointer", marginBottom:48 }}>
      <div style={{ width:360, flexShrink:0, background:article.gradient, position:"relative", minHeight:300 }}>
        <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", justifyContent:"flex-end", padding:28, gap:8 }}>
          <div style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"5px 12px", borderRadius:60, background:"rgba(255,255,255,0.25)", backdropFilter:"blur(8px)", width:"fit-content" }}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1l1.236 2.506L10 3.882l-2 1.95.472 2.75L6 7.25 3.528 8.582l.472-2.75-2-1.95 2.764-.376z" fill="#fff"/></svg>
            <span style={{ fontFamily:"Inter,sans-serif", fontWeight:600, fontSize:12, color:"#fff" }}>Featured</span>
          </div>
          <span style={{ fontFamily:"Inter,sans-serif", fontWeight:500, fontSize:13, color:"rgba(255,255,255,0.75)" }}>{article.readTime} read</span>
        </div>
      </div>
      <div style={{ padding:"36px 40px", display:"flex", flexDirection:"column", justifyContent:"center", flex:1 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
          <Badge category={article.category} size="lg" />
          <span style={{ fontFamily:"Inter,sans-serif", fontSize:13, color:"#a6a09b" }}>{article.readTime} read</span>
        </div>
        <h2 style={{ fontFamily:"Nunito,sans-serif", fontWeight:800, fontSize:26, lineHeight:1.22, color:"#1c1917", marginBottom:14 }}>
          {article.title}
        </h2>
        <p style={{ fontFamily:"Inter,sans-serif", fontWeight:400, fontSize:15, lineHeight:1.65, color:"#57534d", marginBottom:28 }}>
          {article.excerpt}
        </p>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:16 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <Avatar initials={article.initials} />
            <div>
              <div style={{ fontFamily:"Inter,sans-serif", fontWeight:600, fontSize:14, color:"#1c1917" }}>{article.author}</div>
              <div style={{ fontFamily:"Inter,sans-serif", fontWeight:400, fontSize:13, color:"#a6a09b" }}>{article.date}</div>
            </div>
          </div>
          <div style={{ display:"inline-flex", alignItems:"center", gap:8, padding:"12px 22px", borderRadius:60, background:"#783cf0", fontFamily:"Nunito,sans-serif", fontWeight:800, fontSize:14, color:"#fff", boxShadow:"0 6px 2px -4px rgba(14,14,44,0.1)" }}>
            Read article
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        </div>
      </div>
    </a>
  );
}

function ArticleCard({ article }) {
  const [hovered, setHovered] = useState(false);
  return (
    <a href="blog-detail.html"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{ display:"block", background:"#fff", borderRadius:14, border:"1px solid #e7e5e4", overflow:"hidden", cursor:"pointer", transition:"box-shadow 0.2s, transform 0.2s", boxShadow:hovered?"0 8px 28px rgba(120,60,240,0.1)":"0 1px 3px rgba(0,0,0,0.04)", transform:hovered?"translateY(-2px)":"none" }}>
      <div style={{ height:184, background:article.gradient, position:"relative" }}>
        <div style={{ position:"absolute", top:14, left:14 }}>
          {/* Always white on gradient image area */}
          <Badge category={article.category} white={true} />
        </div>
      </div>
      <div style={{ padding:"20px 24px 24px" }}>
        <h3 style={{ fontFamily:"Nunito,sans-serif", fontWeight:800, fontSize:17, lineHeight:1.3, color:"#1c1917", marginBottom:10 }} className="clamp2">
          {article.title}
        </h3>
        <p style={{ fontFamily:"Inter,sans-serif", fontWeight:400, fontSize:14, lineHeight:1.6, color:"#79716b", marginBottom:18 }} className="clamp3">
          {article.excerpt}
        </p>
        <div style={{ borderTop:"1px solid #f4f4f1", paddingTop:16, display:"flex", alignItems:"center", gap:8 }}>
          <Avatar initials={article.initials} size={30} />
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:"Inter,sans-serif", fontWeight:600, fontSize:13, color:"#292524" }}>{article.author}</div>
            <div style={{ fontFamily:"Inter,sans-serif", fontWeight:400, fontSize:12, color:"#a6a09b" }}>{article.date}</div>
          </div>
          <span style={{ fontFamily:"Inter,sans-serif", fontWeight:500, fontSize:12, color:"#a6a09b", whiteSpace:"nowrap" }}>
            {article.readTime} read
          </span>
        </div>
      </div>
    </a>
  );
}

function CategoryTabs({ active, onChange }) {
  return (
    <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:32 }}>
      {CATEGORIES.map(cat => {
        const isActive = active === cat;
        return (
          <button key={cat} onClick={() => onChange(cat)}
            style={{ padding:"8px 20px", borderRadius:60, border:`1px solid ${isActive?"#783cf0":"#e7e5e4"}`, background:isActive?"#f5f2ff":"#fff", fontFamily:"Inter,sans-serif", fontWeight:isActive?600:500, fontSize:14, color:isActive?"#783cf0":"#57534d", cursor:"pointer", transition:"all 0.15s" }}>
            {cat}
          </button>
        );
      })}
    </div>
  );
}

/* ── Newsletter with Figma envelope asset ──────────────────────────── */
function NewsletterBanner() {
  return (
    <div style={{ position:"relative", borderRadius:20, overflow:"hidden", background:"#2d1260", marginTop:56, padding:"52px 56px" }}>

      {/* Envelope illustration — right side */}
      <div style={{ position:"absolute", right:60, top:"50%", transform:"translateY(-50%)", width:220, height:220, pointerEvents:"none" }}>
        <img src="mail-subscribe.png" alt="" style={{ width:"100%", height:"100%", objectFit:"contain" }} />
      </div>

      {/* Text + form */}
      <div style={{ position:"relative", maxWidth:520 }}>
        <div style={{ fontFamily:"Nunito,sans-serif", fontWeight:800, fontSize:28, color:"#fff", lineHeight:1.2, marginBottom:10 }}>
          Get study tips in your inbox
        </div>
        <p style={{ fontFamily:"Inter,sans-serif", fontSize:15, color:"rgba(255,255,255,0.6)", marginBottom:28, lineHeight:1.6 }}>
          Weekly guides, strategies, and VCE news — no spam, ever.
        </p>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1, maxWidth:280, height:48, background:"rgba(255,255,255,0.1)", borderRadius:10, border:"1px solid rgba(255,255,255,0.2)", display:"flex", alignItems:"center", padding:"0 16px", backdropFilter:"blur(8px)" }}>
            <span style={{ fontFamily:"Inter,sans-serif", fontSize:14, color:"rgba(255,255,255,0.4)" }}>your@email.com</span>
          </div>
          <button style={{ padding:"12px 24px", borderRadius:60, background:"#783cf0", border:"none", fontFamily:"Nunito,sans-serif", fontWeight:800, fontSize:14, color:"#fff", cursor:"pointer", whiteSpace:"nowrap", boxShadow:"0 0 24px rgba(120,60,240,0.5)" }}>
            Subscribe
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── App ───────────────────────────────────────────────────────────── */
function App() {
  const [activeCategory, setActiveCategory] = useState("All");
  const filtered = activeCategory === "All" ? ARTICLES : ARTICLES.filter(a => a.category === activeCategory);

  return (
    <div>
      <Nav />
      <Hero />
      <main style={{ maxWidth:1440, margin:"0 auto", padding:"52px 180px 0" }}>

        {/* Featured article */}
        <div style={{ marginBottom:8 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:24 }}>
            <h2 style={{ fontFamily:"Nunito,sans-serif", fontWeight:800, fontSize:20, color:"#1c1917" }}>Featured Article</h2>
            <div style={{ flex:1, height:1, background:"#e7e5e4" }} />
          </div>
          <FeaturedCard article={FEATURED} />
        </div>

        {/* Article grid */}
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:24 }}>
            <h2 style={{ fontFamily:"Nunito,sans-serif", fontWeight:800, fontSize:20, color:"#1c1917" }}>All Articles</h2>
            <div style={{ flex:1, height:1, background:"#e7e5e4" }} />
            <span style={{ fontFamily:"Inter,sans-serif", fontSize:13, color:"#a6a09b", whiteSpace:"nowrap" }}>
              {filtered.length} article{filtered.length !== 1 ? "s" : ""}
            </span>
          </div>
          <CategoryTabs active={activeCategory} onChange={setActiveCategory} />
          {filtered.length > 0 ? (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:24 }}>
              {filtered.map(article => <ArticleCard key={article.id} article={article} />)}
            </div>
          ) : (
            <div style={{ textAlign:"center", padding:"64px 0", color:"#a6a09b", fontFamily:"Inter,sans-serif", fontSize:15 }}>
              No articles in this category yet — check back soon.
            </div>
          )}
        </div>

        {/* Load more */}
        {filtered.length > 0 && (
          <div style={{ display:"flex", justifyContent:"center", marginTop:48 }}>
            <button style={{ padding:"14px 32px", borderRadius:60, border:"1px solid #e7e5e4", background:"#fff", fontFamily:"Nunito,sans-serif", fontWeight:800, fontSize:14, color:"#44403b", cursor:"pointer", boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}>
              Load more articles
            </button>
          </div>
        )}

        <NewsletterBanner />

        {/* Bottom spacing before footer */}
        <div style={{ height:80 }} />
      </main>
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
